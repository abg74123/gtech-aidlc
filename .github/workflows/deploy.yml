name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  AWS_REGION: ap-southeast-1
  PROJECT_NAME: autoflow

permissions:
  id-token: write
  contents: read

jobs:
  # --- Build & Test ---
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: autoflow_test
          POSTGRES_USER: autoflow
          POSTGRES_PASSWORD: autoflow_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U autoflow"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://autoflow:autoflow_secret@localhost:5432/autoflow_test?schema=public
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - uses: nrwl/nx-set-shas@v4
      - run: npx nx affected --target=lint
      - run: npx nx affected --target=test
      - run: npx nx affected --target=build

  # --- Deploy API ---
  deploy-api:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-${{ inputs.environment || 'production' }}-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f infra/docker/api.Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to ECS
        env:
          ECS_CLUSTER: ${{ env.PROJECT_NAME }}-${{ inputs.environment || 'production' }}
          ECS_SERVICE: ${{ env.PROJECT_NAME }}-${{ inputs.environment || 'production' }}-api
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment
          aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE

  # --- Deploy Web ---
  deploy-web:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Angular app
        run: npx nx build web --configuration=production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        env:
          S3_BUCKET: ${{ secrets.WEB_S3_BUCKET }}
        run: |
          aws s3 sync dist/apps/web/browser s3://$S3_BUCKET --delete --cache-control "public, max-age=31536000, immutable"
          aws s3 cp dist/apps/web/browser/index.html s3://$S3_BUCKET/index.html --cache-control "no-cache, no-store, must-revalidate" --content-type "text/html"

      - name: Invalidate CloudFront
        env:
          CF_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation --distribution-id $CF_DISTRIBUTION_ID --paths "/index.html" "/*"
